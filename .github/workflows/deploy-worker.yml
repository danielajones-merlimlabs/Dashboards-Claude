name: Deploy Cloudflare Worker

on:
  push:
    paths:
      - 'worker/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          secrets: |
            JIRA_EMAIL
            JIRA_TOKEN
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}

      - name: Patch Worker URL into dashboard
        run: |
          WORKER_URL="${{ steps.deploy.outputs.deployment-url }}"
          if [ -z "$WORKER_URL" ]; then
            echo "::error::wrangler-action did not output deployment-url — check the deploy step logs"
            exit 1
          fi
          echo "Worker URL: ${WORKER_URL}"
          sed -i "s|const WORKER_URL     = \"__WORKER_URL_PLACEHOLDER__\"|const WORKER_URL     = \"${WORKER_URL}\"|" template.html
          sed -i "s|const WORKER_URL     = \"__WORKER_URL_PLACEHOLDER__\"|const WORKER_URL     = \"${WORKER_URL}\"|" index.html

      - name: Commit patched URL
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add template.html index.html
          git diff --cached --quiet || git commit -m "chore: configure Cloudflare Worker URL [skip ci]"
          git push
