name: Daily DR Sync

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests gspread

      - name: Pull latest changes
        run: git pull --rebase

      - name: Run DR sync
        env:
          JIRA_EMAIL:    ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN:    ${{ secrets.JIRA_TOKEN }}
          JIRA_BASE:     https://merlinlabs.atlassian.net
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: python sync.py

      - name: Build avidyne.html
        run: python3 build_avidyne.py

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html avidyne.html progress-snapshot.json
          git diff --cached --quiet || git commit -m "chore: daily DR sync $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push