name: Daily DR Sync

on:
  schedule:
    - cron: '0 10 * * *'  # 6:00 AM EDT (UTC-4, Mar–Nov). Runs 5 AM EST in winter — adjust to '0 11 * * *' Nov–Mar if needed.
  workflow_dispatch:   # allows manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the rebuilt index.html back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so rebase works cleanly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests gspread

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest template changes
        run: git pull --rebase   # pick up any template.html commits pushed since checkout

      - name: Run DR sync
        env:
          JIRA_EMAIL:      ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN:      ${{ secrets.JIRA_TOKEN }}
          JIRA_BASE:       https://merlinlabs.atlassian.net
          GOOGLE_SA_KEY:   ${{ secrets.GOOGLE_SA_KEY }}
        run: python sync.py

      - name: Commit and push updated files
        run: |
          git add index.html progress-snapshot.json
          git diff --cached --quiet || git commit -m "chore: daily DR sync $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
