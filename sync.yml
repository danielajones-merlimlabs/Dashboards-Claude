name: Daily DR Sync

on:
  schedule:
    - cron: '0 0 * * *'  # 8:00 PM ET (EDT = UTC-4, Mar–Nov). Runs 7 PM ET in winter (EST = UTC-5) — adjust to '0 1 * * *' Nov–Mar if needed.
  workflow_dispatch:   # allows manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the rebuilt index.html back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so rebase works cleanly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests gspread

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest template changes
        run: git pull --rebase   # pick up any template.html commits pushed since checkout

      - name: Run DR sync
        env:
          JIRA_EMAIL:      ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN:      ${{ secrets.JIRA_TOKEN }}
          JIRA_BASE:       https://merlinlabs.atlassian.net
          GOOGLE_SA_KEY:   ${{ secrets.GOOGLE_SA_KEY }}
        run: python sync.py

      - name: Build avidyne.html from index.html
        run: |
          python3 - <<'PYEOF'
          with open('index.html', 'r', encoding='utf-8') as f:
              lines = f.readlines()
          dr_json = closed_json = timestamp = ''
          for line in lines:
              if line.startswith('const DR_DATA = '):
                  dr_json = line.strip()[len('const DR_DATA = '):-1]
              elif line.startswith('const CLOSED_DATA = '):
                  closed_json = line.strip()[len('const CLOSED_DATA = '):-1]
              elif line.startswith('const SYNC_TIMESTAMP = '):
                  timestamp = line.strip()[len('const SYNC_TIMESTAMP = '):-1].strip('"')
          with open('template-avidyne.html', 'r', encoding='utf-8') as f:
              html = f.read()
          html = html.replace('__DR_DATA_PLACEHOLDER__', dr_json)
          html = html.replace('__CLOSED_DATA_PLACEHOLDER__', closed_json)
          html = html.replace('__SYNC_TIMESTAMP_PLACEHOLDER__', timestamp)
          with open('avidyne.html', 'w', encoding='utf-8') as f:
              f.write(html)
          print(f'avidyne.html written ({len(html):,} bytes, {len(dr_json)} chars of DR data)')
          PYEOF

      - name: Commit and push updated files
        run: |
          git add index.html avidyne.html progress-snapshot.json
          git diff --cached --quiet || git commit -m "chore: daily DR sync $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
